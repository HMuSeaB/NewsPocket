name: Daily News Digest

on:
  schedule:
    # 北京时间每天早上 08:15 (UTC 00:15) - 避开整点高峰
    - cron: '15 0 * * *'

  # 允许手动触发
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout config
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          config/
          templates/

    - name: Download NewsPocket binary
      run: |
        curl -sL "https://github.com/HMuSeaB/NewsPocket/releases/latest/download/newspocket-linux-amd64" -o newspocket
        chmod +x newspocket

    - name: Run NewsPocket
      env:
        EMAIL_HOST: ${{ secrets.EMAIL_HOST || 'smtp.qq.com' }}
        EMAIL_PORT: ${{ secrets.EMAIL_PORT || '465' }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        EMAIL_TO: ${{ secrets.EMAIL_TO || secrets.EMAIL_USER }}
      run: ./newspocket --config config/sources.json

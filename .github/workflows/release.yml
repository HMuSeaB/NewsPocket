name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o newspocket-${{ matrix.suffix }} ./cmd/newspocket

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newspocket-${{ matrix.suffix }}
          path: newspocket-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            newspocket-linux-amd64/newspocket-linux-amd64
            newspocket-windows-amd64.exe/newspocket-windows-amd64.exe
            newspocket-darwin-arm64/newspocket-darwin-arm64
          generate_release_notes: true
